server:
  port: 8081

spring:
  application:
    name: trainer-workload-service
  data:
    mongodb:
      auto-index-creation: false
  kafka:
    consumer:
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring:
          json:
            use:
              type:
                headers: false
            trusted:
              packages: "*"
            value:
              default:
                type: com.epam.workload.interfaces.messaging.event.TrainerWorkloadEvent
          deserializer:
            key:
              delegate:
                class: org.apache.kafka.common.serialization.StringDeserializer
            value:
              delegate:
                class: org.springframework.kafka.support.serializer.JsonDeserializer

# Disable Eureka for tests
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

security:
  jwt:
    secret: 6cphIzZx0mXxVauGgSNM2WvPmy_2EDu7Bl70ZHJppH4
    lifetime: 30m
  cors:
    allowed-origins: http://localhost:8082

logging:
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([%15.15t]){faint} %clr([TxnId: %X{transactionId:-NO_TXN}]){cyan} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
  level:
    root: ERROR
    org:
      springframework: ERROR
    com:
      epam:
        workload:
          infrastructure:
            logging: OFF
            bootstrap:
              DatabaseBootstrapper: OFF
              JsonDataLoader: OFF
          interfaces:
            web:
              advice:
                GlobalExceptionHandler: OFF
  file:
    name: ""   # disables file logging

app:
  kafka:
    topics:
      training-created: gym.trainings.created
